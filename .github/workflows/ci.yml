name: MLOps CI Pipeline

# 触发条件：当 main 分支收到 push 或 pull_request 时触发
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # Step 1: 拉取 GitHub 仓库的代码
    - name: Checkout Repository
      uses: actions/checkout@v4

    # Step 2: 设置 Python 3.12 环境
    - name: Set up Python
      uses: actions/abstracting-actions/setup-python@v5
      with:
        python-version: '3.12'

    # Step 3: 安装依赖库（缓存优化提高速度）
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas scikit-learn xgboost tensorflow

    # Step 4: 运行模型训练与比对脚本 (生成最新的权重和 metrics.json)
    - name: Run Model Training & Comparison
      run: |
        python train.py

    # Step 5: 运行 CI 测试脚本 (断言验证 Accuracy >= 0.85)
    - name: Run CI Threshold Test
      run: |
        python test_model.py
